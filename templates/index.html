<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TreeMind</title>
  <link rel="stylesheet" href="/static/css/style.css?v=8">

  <!-- MathJax 3 -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['\(', '\)']],
        displayMath: [['\[', '\]']],
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
      startup: { typeset: false },
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div id="app">

    <!-- ============ 侧边栏 ============ -->
    <aside id="sidebar">
      <!-- 新建对话 -->
      <div id="sidebar-header">
        <button id="btn-new-conv">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建对话
        </button>
      </div>

      <!-- 对话列表 -->
      <div id="conversation-list"></div>

      <!-- 用户区 -->
      <div id="sidebar-user">
        <div id="user-avatar">U</div>
        <span id="user-name">主人</span>
      </div>
    </aside>

    <!-- ============ 主区域 ============ -->
    <main id="main-area">

      <!-- 顶部工具栏 -->
      <div id="toolbar">
        <div id="toolbar-left">
          <button id="btn-toggle-sidebar" title="切换侧边栏">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div id="toolbar-brand">
            <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
              <rect x="2" y="2" width="28" height="28" rx="6" fill="#4F46E5"/>
              <path d="M10 22V10l6 8 6-8v12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>TreeMind</span>
          </div>
        </div>
        <div id="toolbar-right">
          <button class="toolbar-btn" title="搜索">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="toolbar-btn" title="历史">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          <button class="toolbar-btn" title="分享">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </div>
      </div>

      <!-- 对话标题 -->
      <div id="chat-header">
        <span id="chat-title">新对话</span>
      </div>

      <!-- 消息列表 -->
      <div id="message-list">
        <div id="welcome-screen">
          <div id="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <path d="M16 20c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <circle cx="20" cy="18" r="1.5" fill="currentColor"/>
              <circle cx="28" cy="18" r="1.5" fill="currentColor"/>
              <path d="M20 26c0 0 1.5 3 4 3s4-3 4-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>有什么可以帮你的？</h2>
          <p class="welcome-sub">开始一个新的对话，或者从侧边栏选择一个已有对话继续</p>
        </div>
      </div>

      <!-- 输入区 -->
      <div id="input-area">
        <div id="input-wrapper">
          <button id="btn-attach" title="上传文件">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea id="message-input" rows="1" placeholder="给 TreeMind 发送消息..." disabled></textarea>
          <button id="btn-send" disabled title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

        <div id="input-image-preview" class="hidden"></div>

        <div id="input-tools">
          <button id="btn-deep-think" class="tool-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="9.09" y1="9" x2="14.91" y2="15"/><line x1="14.91" y1="9" x2="9.09" y2="15"/></svg>
            深度思考
          </button>
          <button id="btn-web-search" class="tool-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
            联网搜索
          </button>
        </div>

        <p id="input-hint">内容由 AI 生成，请仔细甄别</p>
      </div>
    </main>

  </div>

  <!-- ============ 选中文本工具条（在 #app 外部） ============ -->
  <div id="selection-toolbar" class="sel-hidden">
    <button class="sel-btn" data-action="copy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      复制
    </button>
    <div class="sel-divider"></div>
    <button class="sel-btn sel-btn-primary" data-action="followup">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 004 4h12"/></svg>
      追问
    </button>
    <div class="sel-divider"></div>
    <button class="sel-btn" data-action="explain">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      解释
    </button>
  </div>

  <!-- ============ 对话菜单 ============ -->
  <div id="conv-menu" class="menu-hidden">
    <div class="menu-item" data-action="rename">重命名</div>
    <div class="menu-item" data-action="pin">置顶</div>
    <div class="menu-item" data-action="share">分享</div>
    <div class="menu-item" data-action="export-tree">🌳 生成导图</div>
    <div class="menu-item menu-danger" data-action="delete">删除</div>
  </div>

  <!-- ============ 导图弹窗 ============ -->
  <div id="tree-modal" class="modal-hidden">
    <div id="tree-modal-backdrop"></div>
    <div id="tree-modal-content">
      <div id="tree-modal-header">
        <span id="tree-modal-title">对话结构导图</span>
        <button id="tree-modal-close">✕</button>
      </div>
      <div id="tree-modal-body"></div>
    </div>
  </div>

  <script src="/static/js/app.js?v=8"></script>
</body>
</html>
